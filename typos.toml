# Typos configuration for Jumpstarter monorepo
# https://github.com/crate-ci/typos

[default]
extend-ignore-re = [
    # Ignore hash strings (like 321ba1)
    "[a-f0-9]{6,}",
    # Ignore base64-encoded strings (e.g. tokens in tests)
    "[A-Za-z0-9+/]{40,}=*",
]

[default.extend-words]
# ANDed/ORed are valid technical terms (combined with AND/OR operations)
ANDed = "ANDed"
Ded = "Ded"  # suffix of ANDed in generated CRD docs
ORed = "ORed"

# UE and Fo appear as substrings inside base64-encoded certificate data in tests
UE = "UE"
Fo = "Fo"

# mosquitto is the name of an MQTT broker, not a typo of "mosquito"
mosquitto = "mosquitto"

# ser is short for "serialize" in variable names like ser_json_timedelta
ser = "ser"

# iif/oif are standard nftables keywords (input/output interface)
iif = "iif"
oif = "oif"

# AKS is Azure Kubernetes Service
AKS = "AKS"

[type.gomod]
# Exclude go.mod and go.sum from spell checking
extend-glob = ["go.mod", "go.sum"]
check-file = false

[files]
extend-exclude = [
    # Generated files that shouldn't be spell-checked
    "*.lock",
    # Vendored dependencies
    "vendor/",
    # Vendored asciinema player (minified third-party JS/CSS)
    "docs/source/_static/js/asciinema-player.min.js",
    "docs/source/_static/css/asciinema-player.css",
]
