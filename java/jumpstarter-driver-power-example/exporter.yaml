# The example rig this module's typed device wrapper is generated FROM (the source of truth):
# one proto-first Kotlin power driver, typed via interfaces/registry/native.yaml (which also
# advertises its custom jvm client, CyclingPowerClient).
apiVersion: jumpstarter.dev/v1alpha1
kind: ExporterConfig
metadata:
  namespace: default
  name: example-rig
export:
  power:
    type: jvm:dev.jumpstarter.examples.power.KotlinPowerDriver
