[package]
name = "jumpstarter-router"
description = "Jumpstarter router binary: RouterService stream rendezvous and forwarding; installed at /router in the controller image"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
jumpstarter-controller-config = { path = "../jumpstarter-controller-config" }
jumpstarter-controller-runtime = { path = "../jumpstarter-controller-runtime" }
jumpstarter-protocol = { path = "../jumpstarter-protocol" }
jumpstarter-router-service = { path = "../jumpstarter-router-service" }
kube = { workspace = true, features = ["client", "config", "rustls-tls", "ring"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal", "net"] }
# TcpListenerStream adapts the TLS-terminated listener into the connection
# stream tonic's serve_with_incoming consumes.
tokio-stream = { version = "0.1", features = ["net"] }
# `tls` enables tonic's `Connected` impl for tokio-rustls server streams so
# the hand-rolled TLS acceptor (runtime tls.rs material, Go-parity ALPN) can
# feed serve_with_incoming.
tonic = { workspace = true, features = ["tls"] }
tonic-reflection.workspace = true
tracing.workspace = true
# Same default-features=false + ring pattern as jumpstarter-controller-runtime:
# the workspace standardizes on the ring provider, installed at startup.
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12", "logging"] }
tokio-rustls = { version = "0.26", default-features = false, features = ["ring", "tls12", "logging"] }

[dev-dependencies]
# The inline gRPC wire test generates its own localhost CA/server cert so a
# real tonic TLS client can verify the served stack (reflection + stub).
rcgen.workspace = true
# The signal-contract test opens a real authenticated Stream tunnel (mints
# an HS256 router token) and races it against a synthetic signal, so it
# needs token encoding plus tokio's sync/time test primitives.
jsonwebtoken.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["sync", "time"] }
