[package]
name = "jumpstarter-mcp"
description = "Rust MCP server exposing Jumpstarter hardware-management tools over stdio"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

# Controller/lease/connection tools run on the Rust core (jumpstarter-core::ControllerSession);
# run/introspection tools shell out to the Python `j` CLI (the driver clients are Python).
[dependencies]
jumpstarter-core = { path = "../jumpstarter-core" }
jumpstarter-config = { path = "../jumpstarter-config" }
rmcp = { version = "1", features = ["server", "macros", "transport-io"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "io-std", "process", "sync", "time"] }
serde = { workspace = true }
serde_json.workspace = true
time = { version = "0.3", features = ["formatting"] }
which = "6"
tracing.workspace = true
