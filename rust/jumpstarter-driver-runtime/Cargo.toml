[package]
name = "jumpstarter-driver-runtime"
description = "Generic, codegen-free driver host: serves a stock tonic service over the Jumpstarter SHM transport, exposed to the hub as a ChannelBackend. The author implements only the stock tonic service trait; no per-interface adapter is generated."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
jumpstarter-transport = { path = "../jumpstarter-transport" }
jumpstarter-protocol = { path = "../jumpstarter-protocol" }
# `run_host` ties the driver into the exporter's host-serving seam + config parsing, so a driver
# crate's own bin becomes a complete standalone host with one call.
jumpstarter-exporter = { path = "../jumpstarter-exporter" }
jumpstarter-config = { path = "../jumpstarter-config" }
# The client-CLI entrypoint (`Client`/`client_main!`) lives here alongside the host entrypoint, over
# core's client PRIMITIVES (`ClientSession`, `resolve_driver_uuid`).
jumpstarter-core = { path = "../jumpstarter-core" }
# Re-exported `interface!` + `#[driver]` macros (the one-line lib.rs include + auto-registration).
jumpstarter-driver-macros = { path = "../jumpstarter-driver-macros" }
# `#[driver]` auto-registers each driver impl into a link-time registry the `host_main!` entrypoint
# collects (within the crate, so no cross-crate stripping concerns).
inventory = "0.3"
tonic.workspace = true
prost.workspace = true
prost-types.workspace = true
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "net", "time", "sync", "signal", "io-util"] }
tokio-stream = "0.1"
# The server stack mirrors the transport demux's own wiring (tonic 0.12 routes over axum 0.7);
# these are real deps here because this crate IS the server side.
axum = { version = "0.7", default-features = false }
http = "1"
tower = { version = "0.5", features = ["util"] }
uuid = { version = "1", features = ["v4"] }
tracing.workspace = true
