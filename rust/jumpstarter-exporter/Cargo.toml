[package]
name = "jumpstarter-exporter"
description = "Jumpstarter exporter runtime: registration, Status/Listen, lease lifecycle, router bridging (drivers hosted by a Python subprocess)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
jumpstarter-protocol = { path = "../jumpstarter-protocol" }
jumpstarter-config = { path = "../jumpstarter-config" }
# The shared driver-call seam (`DriverBackend` + `ChannelBackend`), also consumed by the client.
jumpstarter-transport = { path = "../jumpstarter-transport" }
# Reuses the Phase-A channel builder + router byte-bridge.
jumpstarter-client = { path = "../jumpstarter-client" }
# Shared-memory byte ring for the local hub<->host bulk byte plane (opt-in via JMP_SHM_TUNNEL).
jumpstarter-shm = { path = "../jumpstarter-shm", features = ["bridge"] }
tonic.workspace = true
prost-types.workspace = true
thiserror.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "time", "sync", "macros", "net", "io-util", "process", "signal"] }
tokio-stream = { version = "0.1", features = ["net", "sync"] }
# Concurrent host provisioning at startup (spawn + dial all per-driver hosts at once).
futures = "0.3"
# Mint the synthetic root Composite's uuid when federating per-entry driver hosts.
uuid = { version = "1", features = ["v4"] }
tracing.workspace = true
# For the local-UDS ExporterService channel (GetReport on the session socket).
hyper-util = "0.1"
tower = { version = "0.5", features = ["util"] }
http = "1"
# POSIX `kill(2)` liveness probe for the host-side parent-death watchdog (portable across Linux/macOS/BSD).
libc = "0.2"
