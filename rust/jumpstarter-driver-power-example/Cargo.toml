[package]
name = "jumpstarter-driver-power-example"
description = "Proto-first example: a native Rust power driver authored as `impl PowerInterface`, served by the generic jumpstarter-driver-runtime over SHM and driven by a build-time-generated PowerClient"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

# The ONLY committed code is the author's `impl PowerInterface for MockPower`. build.rs generates
# everything else into OUT_DIR (not committed): the stock tonic service trait + messages +
# FILE_DESCRIPTOR_SET (tonic-build), and the typed `PowerClient` (jumpstarter-codegen's
# RustGenerator over the FileDescriptorSet). The round-trip test serves MockPower via the generic
# `jumpstarter_driver_runtime::serve_driver` over SHM and drives it through the generated client.
[lib]
name = "jumpstarter_driver_power_example"
path = "src/lib.rs"

# The crate's own binary (the default `src/main.rs`, named after the package) IS the standalone
# driver host: its `main` is one `jumpstarter_driver_runtime::run_host(..)` call. The polyglot hub
# spawns it for `type: rust:jumpstarter-driver-power-example`. It links the host SDK only — never the
# `jmp` CLI — so a driver crate ships its own host with no per-crate boilerplate.

# The crate's CLIENT CLI binary, spawned by `j` for a driver advertising
# `rust:jumpstarter-driver-power-example` — the client-side mirror of the host binary.
[[bin]]
name = "jumpstarter-driver-power-example-client"
path = "src/client.rs"

[dependencies]
# Combined crate (host + client bins): the host side from `jumpstarter-driver-runtime`, the client
# CLI entrypoint (`client_main!`/`#[client_cli]`) from `jumpstarter-client`, the error taxonomy from
# `jumpstarter-codec`. Its binaries pull both sides by design (the "single crate if desired" path).
jumpstarter-client = { path = "../jumpstarter-client" }
jumpstarter-codec = { path = "../jumpstarter-codec" }
jumpstarter-driver-runtime = { path = "../jumpstarter-driver-runtime" }
jumpstarter-protocol = { path = "../jumpstarter-protocol" }
jumpstarter-transport = { path = "../jumpstarter-transport" }
bytes = "1"
prost.workspace = true
prost-types.workspace = true
tonic.workspace = true
# The custom-client CLI (`PowerCli`) is a clap command surface driving the typed client over native
# gRPC; `tokio` runs the client binary (`src/client.rs`) + `cycle`'s wait.
clap = { workspace = true, features = ["derive"] }
tokio = { workspace = true, features = ["rt", "macros", "time"] }
tokio-stream = "0.1"
serde_json.workspace = true

[build-dependencies]
# One call in build.rs (`jumpstarter_codegen::build::driver_interface`) compiles the proto + generates
# the client/macros/aggregator; the `build-helper` feature pulls in tonic-build.
jumpstarter-codegen = { path = "../jumpstarter-codegen", features = ["build-helper"] }

[dev-dependencies]
jumpstarter-driver-harness = { path = "../jumpstarter-driver-harness" }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "net", "sync"] }
tokio-stream = { version = "0.1", features = ["net"] }
prost-reflect = "0.14"
