name: Controller Unit/Functional tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'controller/**'
      - 'protocol/**'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Cache controller bin directory
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: controller/bin/
          key: ${{ runner.os }}-controller-bin-${{ hashFiles('controller/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-controller-bin-

      - name: Run controller tests
        working-directory: controller
        run: make test

      - name: Cache operator bin directory
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: controller/deploy/operator/bin/
          key: ${{ runner.os }}-operator-bin-${{ hashFiles('controller/deploy/operator/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-operator-bin-

      - name: Run operator tests
        run: make -C controller/deploy/operator test
