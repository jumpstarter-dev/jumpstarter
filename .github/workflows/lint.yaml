name: Linters

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'release-*'
  pull_request:
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect which paths changed to conditionally run linters
  changes:
    runs-on: ubuntu-latest
    outputs:
      controller: ${{ steps.filter.outputs.controller }}
      protocol: ${{ steps.filter.outputs.protocol }}
      python: ${{ steps.filter.outputs.python }}
      renovate: ${{ steps.filter.outputs.renovate }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            controller:
              - 'controller/**'
              - '.github/workflows/lint.yaml'
            protocol:
              - 'protocol/**'
              - '.github/workflows/lint.yaml'
            python:
              - 'python/**'
              - '.github/workflows/lint.yaml'
            renovate:
              - 'renovate.jsonc'
              - '.github/workflows/lint.yaml'

  lint-go:
    needs: changes
    if: needs.changes.outputs.controller == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: .go-version

      - name: Run go linter
        working-directory: controller
        run: make lint

  lint-protobuf:
    needs: changes
    if: needs.changes.outputs.protocol == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run protobuf linter
        working-directory: protocol
        run: make lint

  lint-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run ruff
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          src: './python'
          version-file: python/pyproject.toml

  type-check-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - id: uv
        run: echo "version=$(cat .uv-version)" >> "$GITHUB_OUTPUT"
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ steps.uv.outputs.version }}
          python-version-file: .py-version

      - name: Run ty
        working-directory: python
        run: make ty

  validate-renovate:
    needs: changes
    if: needs.changes.outputs.renovate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Validate Renovate config
        run: npx --yes --package renovate -- renovate-config-validator

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run typos
        uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2
        with:
          config: ./typos.toml
