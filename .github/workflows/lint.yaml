name: Linters

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'release-*'
  pull_request:
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect which paths changed to conditionally run linters
  changes:
    runs-on: ubuntu-latest
    outputs:
      controller: ${{ steps.filter.outputs.controller }}
      protocol: ${{ steps.filter.outputs.protocol }}
      python: ${{ steps.filter.outputs.python }}
      renovate: ${{ steps.filter.outputs.renovate }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            controller:
              - 'controller/**'
              - '.github/workflows/lint.yaml'
            protocol:
              - 'protocol/**'
              - '.github/workflows/lint.yaml'
            python:
              - 'python/**'
              - '.github/workflows/lint.yaml'
            renovate:
              - 'renovate.json'
              - '.github/workflows/lint.yaml'

  lint-go:
    needs: changes
    if: needs.changes.outputs.controller == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: .go-version

      - name: Run go linter
        working-directory: controller
        run: make lint

  lint-protobuf:
    needs: changes
    if: needs.changes.outputs.protocol == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run protobuf linter
        working-directory: protocol
        run: make lint

  lint-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ruff
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          src: './python'
          version-file: python/pyproject.toml

  type-check-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@803947b9bd8e9f986429fa0c5a41c367cd732b41 # v7.2.1
        with:
          version: "0.11.19"
          python-version-file: .py-version

      - name: Run ty
        working-directory: python
        run: make ty

  validate-renovate:
    needs: changes
    if: needs.changes.outputs.renovate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Renovate config
        run: npx --yes --package renovate -- renovate-config-validator

  check-pinned-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for unpinned container images and tool versions
        run: |
          ALLOWLIST=(
            "quay.io/jumpstarter-dev/"
          )

          ERRORS=0

          while IFS= read -r line; do
            file="${line%%:*}"
            match="${line#*:}"
            allowed=false
            for pattern in "${ALLOWLIST[@]}"; do
              if [[ "$match" == *"$pattern"* ]]; then
                allowed=true
                break
              fi
            done
            if [[ "$allowed" == false ]]; then
              echo "::error file=${file}::Unpinned version found: ${match}"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(
            grep -rn ':latest' \
              --include='Dockerfile*' --include='Containerfile*' \
              --include='*.yaml' --include='*.yml' \
              --include='*.json' \
              --exclude-dir=vendor --exclude-dir=examples \
              --exclude-dir=forge_output \
              --exclude='lint.yaml' \
              . | grep -v 'runs-on:' | grep -v 'node_modules' \
                | grep -v 'TAGS=.*:latest' || true

            grep -rn 'version: latest' \
              --include='*.yaml' --include='*.yml' \
              --exclude='lint.yaml' \
              . --exclude-dir=vendor --exclude-dir=forge_output || true
          )

          if [[ "$ERRORS" -gt 0 ]]; then
            echo ""
            echo "Found ${ERRORS} unpinned version(s). Pin to a specific version so Renovate can manage updates."
            exit 1
          fi

          echo "All versions are pinned."

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run typos
        uses: crate-ci/typos@a1d64977b4aa1709d6328d518aa753f4899352d8 # v1.42.2
        with:
          config: ./typos.toml
