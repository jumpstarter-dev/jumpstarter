name: Linters

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'release-*'
  pull_request:
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect which paths changed to conditionally run linters
  changes:
    runs-on: ubuntu-latest
    outputs:
      controller: ${{ steps.filter.outputs.controller }}
      helm: ${{ steps.filter.outputs.helm }}
      protocol: ${{ steps.filter.outputs.protocol }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            controller:
              - 'controller/**'
              - '.github/workflows/lint.yaml'
            helm:
              - 'controller/deploy/helm/**'
              - '.github/workflow/lint.yaml'
            protocol:
              - 'protocol/**'
              - '.github/workflows/lint.yaml'
            python:
              - 'python/**'
              - '.github/workflows/lint.yaml'

  lint-go:
    needs: changes
    if: needs.changes.outputs.controller == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Run go linter
        working-directory: controller
        run: make lint

  lint-helm:
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run helm linter
        working-directory: controller
        run: make lint-helm

  lint-protobuf:
    needs: changes
    if: needs.changes.outputs.protocol == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run protobuf linter
        working-directory: protocol
        run: make lint

  lint-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run ruff
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          src: './python'
          version-file: python/pyproject.toml

  type-check-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@803947b9bd8e9f986429fa0c5a41c367cd732b41 # v7.2.1
        with:
          version: latest

      - name: Run ty
        working-directory: python
        run: make ty

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run typos
        uses: crate-ci/typos@cf5f1c29a8ac336af8568821ec41919923b05a83 # v1.45.1
        with:
          config: ./typos.toml
