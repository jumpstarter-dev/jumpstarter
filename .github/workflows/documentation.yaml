name: Documentation

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths:
      - 'python/docs/**'
      - 'python/packages/**'
      - 'protocol/proto/**'
  pull_request:
    paths:
      - 'python/docs/**'
      - 'python/packages/**'
      - 'protocol/proto/**'
  merge_group:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash
    working-directory: python

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: uv
        run: echo "version=$(cat .uv-version)" >> "$GITHUB_OUTPUT"
        working-directory: .
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ steps.uv.outputs.version }}
          python-version-file: .py-version

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Build the python index
        run: |
          LATEST_RELEASE=$(gh release list --limit 1 --json tagName | jq -r .[0].tagName)
          uvx dumb-pypi \
            --package-list <(gh release view $LATEST_RELEASE --json assets | jq -r .assets[].name) \
            --packages-url https://github.com/jumpstarter-dev/jumpstarter/releases/download/$LATEST_RELEASE \
            --title "Jumpstarter Python Packages" --output-dir docs/source/extra/packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the documentation
        run: make docs-all

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./python/docs/build

  check-warnings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: uv
        run: echo "version=$(cat .uv-version)" >> "$GITHUB_OUTPUT"
        working-directory: .
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ steps.uv.outputs.version }}
          python-version-file: .py-version

      - name: Verify generated gRPC docs are up to date
        run: make docs-check-grpc

      - name: Build the documentation for the current version (no warnings allowed)
        run: make sync && make docs

  linkcheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: uv
        run: echo "version=$(cat .uv-version)" >> "$GITHUB_OUTPUT"
        working-directory: .
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ steps.uv.outputs.version }}
          python-version-file: .py-version

      - name: Check documentation links
        run: make sync && make docs-linkcheck

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
