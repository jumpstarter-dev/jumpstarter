name: "Run E2E Tests"
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: false
    steps:
      - uses: jumpstarter-dev/jumpstarter-e2e@client-svc-lease
        with:
          controller-ref: client-svc-lease
          jumpstarter-ref: ${{ github.ref }}
