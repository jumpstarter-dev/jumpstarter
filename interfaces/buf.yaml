version: v2
modules:
  - path: proto
deps:
  - buf.build/googleapis/googleapis
lint:
  use:
    - STANDARD
  except:
    - ENUM_ZERO_VALUE_SUFFIX
    - FIELD_LOWER_SNAKE_CASE
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
    # Interface services are named after their Python interface class
    # (e.g. PowerInterface), not suffixed with "Service".
    - SERVICE_SUFFIX
    # @exportstream byte channels use StreamData as the request type rather
    # than a method-derived <Method>Request name.
    - RPC_REQUEST_STANDARD_NAME
  rpc_allow_same_request_response: true
  rpc_allow_google_protobuf_empty_requests: true
  rpc_allow_google_protobuf_empty_responses: true
breaking:
  use:
    - FILE
