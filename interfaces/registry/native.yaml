# Hand-maintained registry entries for NON-Python driver types (`rust:<crate>` / `jvm:<fqn>`),
# merged with the generated python.yaml by `jumpstarter-codegen --kind device` (same interface
# entries union their driver lists). Proto-first Rust/JVM drivers' interfaces are the committed
# protos by construction — list each driver's `type:` string (as written in exporter configs)
# under its interface, optionally with per-language custom clients
# (`clients: {rust: <type path>, jvm: <fqn>, python: <class path>}`).
version: 1
interfaces:
  - name: jumpstarter.interfaces.power.v1.PowerInterface
    proto: jumpstarter/interfaces/power/v1/power.proto
    drivers:
      - rust:jumpstarter-driver-power-pure
      - name: jvm:dev.jumpstarter.examples.power.KotlinPowerDriver
        clients:
          jvm: dev.jumpstarter.examples.power.CyclingPowerClient
      - jvm:dev.jumpstarter.examples.power.JavaPowerDriver
