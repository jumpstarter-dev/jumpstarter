# Manual deployment for the ExporterSet controller (QEMU provisioner).
#
# Deploys into the same namespace as the Jumpstarter controller/router
# (jumpstarter-lab), matching what the operator will do when it owns
# this component.
#
# Prerequisites:
#   - Jumpstarter CRDs installed (ExporterSet, VirtualTargetClass, Exporter, Lease)
#   - The jumpstarter-lab namespace exists (created by `make deploy` / e2e-setup)
#
# Install CRDs first:
#   kubectl apply -f deploy/operator/config/crd/bases/
#
# Then apply this file:
#   kubectl apply -f hack/deploy-exporterset-qemu.yaml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: exporter-set-controller
  namespace: jumpstarter-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: exporter-set-controller
rules:
  - apiGroups: ["virtualtarget.jumpstarter.dev"]
    resources: ["exportersets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["virtualtarget.jumpstarter.dev"]
    resources: ["exportersets/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["virtualtarget.jumpstarter.dev"]
    resources: ["exportersets/finalizers"]
    verbs: ["update"]
  - apiGroups: ["virtualtarget.jumpstarter.dev"]
    resources: ["exportersets/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["virtualtarget.jumpstarter.dev"]
    resources: ["virtualtargetclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["jumpstarter.dev"]
    resources: ["exporters"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["jumpstarter.dev"]
    resources: ["leases"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: exporter-set-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: exporter-set-controller
subjects:
  - kind: ServiceAccount
    name: exporter-set-controller
    namespace: jumpstarter-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: exporter-set-controller
  namespace: jumpstarter-lab
  labels:
    app: exporter-set-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exporter-set-controller
  template:
    metadata:
      labels:
        app: exporter-set-controller
    spec:
      serviceAccountName: exporter-set-controller
      containers:
        - name: controller
          image: quay.io/jumpstarter-dev/jumpstarter-exporterset-controller:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--provisioner=qemu.jumpstarter.dev"
            - "--leader-elect=false"
          ports:
            - containerPort: 8081
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
