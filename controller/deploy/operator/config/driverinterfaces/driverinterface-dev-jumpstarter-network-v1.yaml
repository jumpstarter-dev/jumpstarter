apiVersion: jumpstarter.dev/v1alpha1
kind: DriverInterface
metadata:
  name: dev-jumpstarter-network-v1
spec:
  proto:
    package: jumpstarter.interfaces.network.v1
    descriptor: 
  drivers:
    - language: python
      package: jumpstarter-driver-network
      clientClass: "jumpstarter_driver_network.client.NetworkClient"
      driverClasses:
        - "jumpstarter_driver_network.driver:DbusNetwork"
        - "jumpstarter_driver_network.driver:EchoNetwork"
        - "jumpstarter_driver_network.driver:TcpNetwork"
        - "jumpstarter_driver_network.driver:UdpNetwork"
        - "jumpstarter_driver_network.driver:UnixNetwork"
        - "jumpstarter_driver_network.driver:VsockNetwork"
        - "jumpstarter_driver_network.driver:WebsocketNetwork"
    - language: java
      package: ":java:jumpstarter-driver-network"
      clientClass: "dev.jumpstarter.driver.network.NetworkClient"
    - language: typescript
      package: "@jumpstarter/driver-network"
      clientClass: "NetworkClient"
    - language: rust
      package: "jumpstarter-driver-network"
      clientClass: "jumpstarter_driver_network::NetworkClient"
