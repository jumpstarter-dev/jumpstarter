apiVersion: jumpstarter.dev/v1alpha1
kind: ExporterAccessPolicy
metadata:
  labels:
    app.kubernetes.io/name: jumpstarter-router
    app.kubernetes.io/managed-by: kustomize
  name: default
spec:
  exporterSelector:
    matchLabels:
      dut: fancy-hardware
  policies:
    - description: "Administrators — unrestricted access, highest priority"
      priority: 20
      from:
        - clientSelector:
            matchLabels:
              client-type: administrator
    - description: "Developers — maximum 24h lease duration"
      priority: 10
      maximumDuration: 24h
      from:
        - clientSelector:
            matchLabels:
              client-type: developer
    - description: "CI — spot instances only, maximum 12h, can be preempted"
      priority: 5
      maximumDuration: 12h
      spotAccess: true
      from:
        - clientSelector:
            matchLabels:
              client-type: ci
