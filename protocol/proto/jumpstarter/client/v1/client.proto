syntax = "proto3";

package jumpstarter.client.v1;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/protobuf/empty.proto";
import "jumpstarter/v1/requests.proto";
import "jumpstarter/v1/resources.proto";

// ClientService is the namespace-scoped Client-actor API used by the
// `jmp` CLI. It deliberately reuses every request/response message
// from jumpstarter.v1 (including their historical client.v1 field tag layout)
// so deployed CLI binaries keep wire-compatible after the type definitions were hoisted.
service ClientService {
  rpc GetExporter(jumpstarter.v1.GetRequest) returns (jumpstarter.v1.Exporter) {
    option (google.api.http) = {get: "/client/v1/{name=namespaces/*/exporters/*}"};
    option (google.api.method_signature) = "name";
  }
  rpc ListExporters(jumpstarter.v1.ExporterListRequest) returns (jumpstarter.v1.ExporterListResponse) {
    option (google.api.http) = {get: "/client/v1/{parent=namespaces/*}/exporters"};
    option (google.api.method_signature) = "parent";
  }

  rpc GetLease(jumpstarter.v1.GetRequest) returns (jumpstarter.v1.Lease) {
    option (google.api.http) = {get: "/client/v1/{name=namespaces/*/leases/*}"};
    option (google.api.method_signature) = "name";
  }
  rpc ListLeases(jumpstarter.v1.LeaseListRequest) returns (jumpstarter.v1.LeaseListResponse) {
    option (google.api.http) = {get: "/client/v1/{parent=namespaces/*}/leases"};
    option (google.api.method_signature) = "parent";
  }
  rpc CreateLease(jumpstarter.v1.LeaseCreateRequest) returns (jumpstarter.v1.Lease) {
    option (google.api.http) = {
      post: "/client/v1/{parent=namespaces/*}/leases"
      body: "lease"
    };
    option (google.api.method_signature) = "parent,lease,lease_id";
  }
  rpc UpdateLease(jumpstarter.v1.LeaseUpdateRequest) returns (jumpstarter.v1.Lease) {
    option (google.api.http) = {
      patch: "/client/v1/{lease.name=namespaces/*/leases/*}"
      body: "lease"
    };
    option (google.api.method_signature) = "lease,update_mask";
  }
  rpc DeleteLease(jumpstarter.v1.DeleteRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/client/v1/{name=namespaces/*/leases/*}"};
    option (google.api.method_signature) = "name";
  }
}
