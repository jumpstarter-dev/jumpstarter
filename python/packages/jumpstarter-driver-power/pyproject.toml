[project]
name = "jumpstarter-driver-power"
dynamic = ["version", "urls"]
description = ""
authors = [
  { name = "Miguel Angel Ajo Pelayo", email = "majopela@redhat.com" },
  { name = "Nick Cao", email = "ncao@redhat.com" },
]
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["jumpstarter", "pyserial>=3.5", "click>=8.1.7.2", "pydantic>=2.8.2"]

[project.entry-points."jumpstarter.drivers"]
MockPower = "jumpstarter_driver_power.driver:MockPower"

[dependency-groups]
dev = ["pytest>=8.3.2", "pytest-cov>=5.0.0", "trio>=0.28.0"]

[tool.hatch.metadata.hooks.vcs.urls]
Homepage = "https://jumpstarter.dev"
source_archive = "https://github.com/jumpstarter-dev/repo/archive/{commit_hash}.zip"

[tool.hatch.version]
source = "vcs"
raw-options = { 'root' = '../../../' }

[build-system]
requires = ["hatchling", "hatch-vcs", "hatch-pin-jumpstarter"]
build-backend = "hatchling.build"

[tool.hatch.build.hooks.pin_jumpstarter]
name = "pin_jumpstarter"

# Proto-first codegen: regenerate jumpstarter_driver_power/_generated (message dataclasses, driver
# interface base, typed client, embedded descriptor) from the committed interfaces/proto
# power.proto on every build. The generated modules are gitignored build artifacts — the .proto is
# the source of truth. Edit-loop regen: `uv run python hatch_build.py` in this directory.
[tool.hatch.build.hooks.custom]
path = "hatch_build.py"
