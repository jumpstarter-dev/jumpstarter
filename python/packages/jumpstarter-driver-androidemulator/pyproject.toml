[project]
name = "jumpstarter-driver-androidemulator"
dynamic = ["version", "urls"]
description = "Android emulator driver for Jumpstarter - manages emulator lifecycle with ADB tunneling"
readme = "README.md"
license = "Apache-2.0"
authors = [
    { name = "Kirk Brauer", email = "kbrauer@hatci.com" }
]
requires-python = ">=3.11"
dependencies = [
    "jumpstarter",
    "jumpstarter-driver-adb",
    "jumpstarter-driver-composite",
    "jumpstarter-driver-power",
]

[project.optional-dependencies]
python-api = ["adbutils>=2.8.7"]

[project.entry-points."jumpstarter.drivers"]
AndroidEmulator = "jumpstarter_driver_androidemulator.driver:AndroidEmulator"
AndroidEmulatorPower = "jumpstarter_driver_androidemulator.driver:AndroidEmulatorPower"

[tool.hatch.version]
source = "vcs"
raw-options = { 'root' = '../../../'}

[tool.hatch.metadata.hooks.vcs.urls]
Homepage = "https://jumpstarter.dev"
source_archive = "https://github.com/jumpstarter-dev/repo/archive/{commit_hash}.zip"

[tool.pytest.ini_options]
addopts = "--cov --cov-report=html --cov-report=xml"
log_cli = true
log_cli_level = "INFO"
testpaths = ["jumpstarter_driver_androidemulator"]
asyncio_mode = "auto"

[tool.uv.sources]
jumpstarter-driver-adb = { workspace = true }
jumpstarter-driver-composite = { workspace = true }
jumpstarter-driver-power = { workspace = true }

[build-system]
requires = ["hatchling", "hatch-vcs", "hatch-pin-jumpstarter"]
build-backend = "hatchling.build"

[tool.hatch.build.hooks.pin_jumpstarter]
name = "pin_jumpstarter"

[dependency-groups]
dev = [
    "pytest-cov>=6.0.0",
    "pytest>=8.3.3",
]
