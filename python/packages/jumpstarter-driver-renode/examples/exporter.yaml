# Renode driver exporter configuration examples
#
# Each example shows a different Renode target. The driver accepts any
# .repl platform description (built-in or custom) and any UART peripheral
# path -- new targets require only YAML configuration, no code changes.

# --- STM32F407 Discovery (opensomeip FreeRTOS/ThreadX) ---
# Uses Renode's built-in platform, USART2 for console output.
#
# apiVersion: jumpstarter.dev/v1alpha1
# kind: ExporterConfig
# metadata:
#   name: renode-stm32f407
# export:
#   ecu:
#     type: jumpstarter_driver_renode.driver.Renode
#     config:
#       platform: "platforms/boards/stm32f4_discovery-kit.repl"
#       uart: "sysbus.usart2"

# --- NXP S32K388 (opensomeip Zephyr) ---
# Uses a custom .repl and extra_commands to enable the PL011 UART.
#
# apiVersion: jumpstarter.dev/v1alpha1
# kind: ExporterConfig
# metadata:
#   name: renode-s32k388
# export:
#   ecu:
#     type: jumpstarter_driver_renode.driver.Renode
#     config:
#       platform: "/path/to/s32k388_renode.repl"
#       uart: "sysbus.uart0"
#       extra_commands:
#         - "sysbus WriteDoubleWord 0x40090030 0x0301"

# --- Nucleo H753ZI (openbsw-zephyr) ---
# Uses Renode's built-in STM32H743 platform (close relative), USART3.
#
# apiVersion: jumpstarter.dev/v1alpha1
# kind: ExporterConfig
# metadata:
#   name: renode-nucleo-h753zi
# export:
#   ecu:
#     type: jumpstarter_driver_renode.driver.Renode
#     config:
#       platform: "platforms/cpus/stm32h743.repl"
#       uart: "sysbus.usart3"

# Minimal working example (uncomment and fill in token/endpoint):
apiVersion: jumpstarter.dev/v1alpha1
kind: ExporterConfig
metadata:
  name: renode-example
  namespace: default
endpoint: grpc.jumpstarter.example.com:443
token: "<token>"
export:
  ecu:
    type: jumpstarter_driver_renode.driver.Renode
    config:
      platform: "platforms/boards/stm32f4_discovery-kit.repl"
      uart: "sysbus.usart2"
