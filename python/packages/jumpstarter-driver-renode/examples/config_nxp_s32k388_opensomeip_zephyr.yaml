apiVersion: jumpstarter.dev/v1alpha1
kind: ExporterConfig
metadata:
  name: renode
  namespace: default
endpoint: grpc.jumpstarter.example.com:443
token: xxxxx
export:
  ecu:
    type: jumpstarter_driver_renode.driver.Renode
    config:
      platform: /path/to/s32k388_renode.repl
      uart: sysbus.uart0
      extra_commands:
      - sysbus WriteDoubleWord 0x40090030 0x0301
