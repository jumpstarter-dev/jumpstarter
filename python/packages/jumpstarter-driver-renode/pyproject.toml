[project]
name = "jumpstarter-driver-renode"
dynamic = ["version", "urls"]
description = "Renode emulation framework driver for Jumpstarter"
readme = "README.md"
license = "Apache-2.0"
authors = [
    { name = "Vinicius Zein", email = "vtzein@gmail.com" }
]
requires-python = ">=3.11"
dependencies = [
    "jumpstarter",
    "jumpstarter-driver-composite",
    "jumpstarter-driver-network",
    "jumpstarter-driver-opendal",
    "jumpstarter-driver-power",
    "jumpstarter-driver-pyserial",
]

[project.entry-points."jumpstarter.drivers"]
Renode = "jumpstarter_driver_renode.driver:Renode"
RenodePower = "jumpstarter_driver_renode.driver:RenodePower"
RenodeFlasher = "jumpstarter_driver_renode.driver:RenodeFlasher"

[tool.hatch.version]
source = "vcs"
raw-options = { 'root' = '../../../'}

[tool.hatch.metadata.hooks.vcs.urls]
Homepage = "https://jumpstarter.dev"
source_archive = "https://github.com/jumpstarter-dev/repo/archive/{commit_hash}.zip"

[tool.pytest.ini_options]
addopts = "--cov --cov-report=html --cov-report=xml"
log_cli = true
log_cli_level = "INFO"
testpaths = ["jumpstarter_driver_renode"]

[tool.uv.sources]
jumpstarter = { workspace = true }
jumpstarter-driver-opendal = { workspace = true }
jumpstarter-driver-composite = { workspace = true }
jumpstarter-driver-network = { workspace = true }
jumpstarter-driver-pyserial = { workspace = true }
jumpstarter-driver-power = { workspace = true }

[build-system]
requires = ["hatchling", "hatch-vcs", "hatch-pin-jumpstarter"]
build-backend = "hatchling.build"

[tool.hatch.build.hooks.pin_jumpstarter]
name = "pin_jumpstarter"

[dependency-groups]
dev = [
    "pytest>=8.3.2",
    "pytest-cov>=5.0.0",
    "pytest-anyio>=0.0.0",
]
