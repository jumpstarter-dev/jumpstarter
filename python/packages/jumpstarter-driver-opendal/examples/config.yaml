apiVersion: jumpstarter.dev/v1alpha1
kind: ExporterConfig
metadata:
  name: opendal
  namespace: default
endpoint: grpc.jumpstarter.example.com:443
token: xxxxx
export:
  opendal:
    type: jumpstarter_driver_opendal.driver.Opendal
    config:
      scheme: fs
      kwargs:
        root: /tmp/jumpstarter
      remove_created_on_close: false
