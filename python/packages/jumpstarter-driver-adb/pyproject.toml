[project]
name = "jumpstarter-driver-adb"
dynamic = ["version", "urls"]
description = "ADB tunneling driver for Jumpstarter - enables remote Android device access via standard ADB tools"
readme = "README.md"
license = "Apache-2.0"
authors = [
    { name = "Kirk Brauer", email = "kbrauer@hatci.com" }
]
requires-python = ">=3.11"
dependencies = [
    "click>=8.0.0",
    "jumpstarter",
    "jumpstarter-driver-network",
]

[project.optional-dependencies]
python-api = ["adbutils>=2.8.7"]

[project.entry-points."jumpstarter.drivers"]
AdbServer = "jumpstarter_driver_adb.driver:AdbServer"

[tool.hatch.version]
source = "vcs"
raw-options = { 'root' = '../../../'}

[tool.hatch.metadata.hooks.vcs.urls]
Homepage = "https://jumpstarter.dev"
source_archive = "https://github.com/jumpstarter-dev/repo/archive/{commit_hash}.zip"

[tool.pytest.ini_options]
addopts = "--cov --cov-report=html --cov-report=xml"
log_cli = true
log_cli_level = "INFO"
testpaths = ["jumpstarter_driver_adb"]
asyncio_mode = "auto"

[build-system]
requires = ["hatchling", "hatch-vcs", "hatch-pin-jumpstarter"]
build-backend = "hatchling.build"

[tool.hatch.build.hooks.pin_jumpstarter]
name = "pin_jumpstarter"

[dependency-groups]
dev = [
    "pytest-cov>=6.0.0",
    "pytest>=8.3.3",
]
