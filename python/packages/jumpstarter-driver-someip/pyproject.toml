[project]
name = "jumpstarter-driver-someip"
dynamic = ["version", "urls"]
description = "SOME/IP (Scalable service-Oriented MiddlewarE over IP) driver for Jumpstarter"
readme = "README.md"
license = "Apache-2.0"
authors = [
    { name = "Vinicius Zein", email = "vtzein@gmail.com" },
]
requires-python = ">=3.11"
dependencies = [
    "jumpstarter",
    # TODO: replace with "opensomeip>=0.1.4,<0.2.0" once v0.1.4 is published on PyPI
    "opensomeip @ git+https://github.com/vtz/opensomeip-python.git@ac1afdeb1ffa002ce3af4e5a3ca2c6fc9a690346",
]

[project.entry-points."jumpstarter.drivers"]
SomeIp = "jumpstarter_driver_someip.driver:SomeIp"

[dependency-groups]
dev = [
    "pytest-cov>=6.0.0",
    "pytest>=8.3.3",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.metadata.hooks.vcs.urls]
Homepage = "https://jumpstarter.dev"
source_archive = "https://github.com/jumpstarter-dev/repo/archive/{commit_hash}.zip"

[tool.hatch.version]
source = "vcs"
raw-options = { 'root' = '../../../' }

[tool.pytest.ini_options]
addopts = "--cov --cov-report=html --cov-report=xml"
log_cli = true
log_cli_level = "INFO"
testpaths = ["jumpstarter_driver_someip"]

[build-system]
requires = ["hatchling", "hatch-vcs", "hatch-pin-jumpstarter"]
build-backend = "hatchling.build"

[tool.hatch.build.hooks.pin_jumpstarter]
name = "pin_jumpstarter"
