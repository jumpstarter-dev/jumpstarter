[project]
name = "jumpstarter-driver-ssh-mount"
dynamic = ["version", "urls"]
description = "SSHFS mount/umount driver for Jumpstarter that provides remote filesystem mounting via sshfs"
readme = "README.md"
license = "Apache-2.0"
authors = [
    { name = "The Jumpstarter Authors" }
]
requires-python = ">=3.11"
dependencies = [
    "click>=8.0.0",
    "jumpstarter",
    "jumpstarter-driver-composite",
    "jumpstarter-driver-network",
    "jumpstarter-driver-ssh",
]

[project.entry-points."jumpstarter.drivers"]
SSHMount = "jumpstarter_driver_ssh_mount.driver:SSHMount"

[tool.hatch.version]
source = "vcs"
raw-options = { 'root' = '../../../'}

[tool.hatch.metadata.hooks.vcs.urls]
Homepage = "https://jumpstarter.dev"
source_archive = "https://github.com/jumpstarter-dev/repo/archive/{commit_hash}.zip"

[tool.pytest.ini_options]
addopts = "--cov --cov-report=html --cov-report=xml"
log_cli = true
log_cli_level = "INFO"
testpaths = ["jumpstarter_driver_ssh_mount"]
asyncio_mode = "auto"

[build-system]
requires = ["hatchling", "hatch-vcs", "hatch-pin-jumpstarter"]
build-backend = "hatchling.build"

[tool.hatch.build.hooks.pin_jumpstarter]
name = "pin_jumpstarter"

[dependency-groups]
dev = [
    "pytest-cov>=6.0.0",
    "pytest>=8.3.3",
]
