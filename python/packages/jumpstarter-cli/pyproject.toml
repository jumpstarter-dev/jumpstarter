[project]
name = "jumpstarter-cli"
dynamic = ["version", "urls"]
description = ""
authors = [
  { name = "Nick Cao", email = "ncao@redhat.com" },
  { name = "Miguel Angel Ajo Pelayo", email = "majopela@redhat.com" },
  { name = "Kirk Brauer", email = "kbrauer@hatci.com" },
]
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
  # The native `jmp` + `j` binaries (maturin bin wheel). This package is the thin Python
  # `jumpstarter_cli.j` driver-client CLI that native `j` delegates to for Python clients.
  # anyio + click (used by `j` and every driver client) come transitively via `jumpstarter`.
  "jumpstarter-cli-bin",
  "jumpstarter",
]

[dependency-groups]
dev = [
  "pytest>=8.3.2",
  "pytest-anyio>=0.0.0",
  "pytest-asyncio>=0.0.0",
  "pytest-cov>=5.0.0",
]

# No console scripts: both `jmp` and `j` are native binaries (jumpstarter-cli-bin). This package
# is the pure-Python `jumpstarter_cli` lib — native `j` delegates Python-client drivers to it via
# `python -m jumpstarter_cli.j`.

[tool.hatch.build.targets.wheel]
packages = ["jumpstarter_cli"]

[tool.hatch.metadata.hooks.vcs.urls]
Homepage = "https://jumpstarter.dev"
source_archive = "https://github.com/jumpstarter-dev/repo/archive/{commit_hash}.zip"

[tool.hatch.version]
source = "vcs"
raw-options = { 'root' = '../../../' }

[build-system]
requires = ["hatchling", "hatch-vcs", "hatch-pin-jumpstarter"]
build-backend = "hatchling.build"

[tool.hatch.build.hooks.pin_jumpstarter]
name = "pin_jumpstarter"
