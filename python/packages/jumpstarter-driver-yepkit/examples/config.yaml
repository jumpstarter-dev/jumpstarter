  namespace: default
endpoint: grpc.jumpstarter.example.com:443
token: xxxxx
export:
  power:
    type: jumpstarter_driver_yepkit.driver.Ykush
    config:
      serial: YK25838
      port: '1'
  power2:
    type: jumpstarter_driver_yepkit.driver.Ykush
    config:
      serial: YK25838
      port: '2'
