[project]
name = "jumpstarter"
dynamic = ["version", "urls"]
description = ""
authors = [
    { name = "Miguel Angel Ajo Pelayo", email = "majopela@redhat.com" },
    { name = "Nick Cao", email = "ncao@redhat.com" },
    { name = "Kirk Brauer", email = "kbrauer@hatci.com" },
]
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
    "jumpstarter-core",
    "anyio>=4.4.0,!=4.6.2",
    "click>=8.1.7.2",
]

[project.optional-dependencies]
# Presigned-resource fetching (`Driver._resource_from_presigned` in driver/base.py) downloads a
# presigned HTTP URL server-side; aiohttp/yarl are imported lazily, so the base install stays lean
# and only users of the presigned path need this extra.
presigned = [
    "aiohttp>=3.9.0",
    "yarl>=1.9.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.2",
    "pytest-cov>=6.0.0",
    "pytest-anyio>=0.0.0",
    "pytest-asyncio>=0.0.0",
    "cryptography>=43.0.3",
    # pydantic is no longer a runtime dependency (the value codec + config parsing
    # live in the Rust core); the jsonable parity test still pins its output.
    "pydantic>=2.8.2",
    # The presigned extra's deps — the base_test / streams.aiohttp doctest collection import them.
    "aiohttp>=3.9.0",
    "yarl>=1.9.0",
    "jumpstarter-driver-power",
    "jumpstarter-driver-network",
    "jumpstarter-driver-composite",
]

[tool.coverage.run]
source = ["."]

[tool.hatch.build.targets.wheel]
packages = ["jumpstarter"]

[tool.hatch.metadata.hooks.vcs.urls]
Homepage = "https://jumpstarter.dev"
source_archive = "https://github.com/jumpstarter-dev/repo/archive/{commit_hash}.zip"

[tool.hatch.version]
source = "vcs"
raw-options = { 'root' = '../../../' }

[build-system]
requires = ["hatchling", "hatch-vcs", "hatch-pin-jumpstarter"]
build-backend = "hatchling.build"

[tool.hatch.build.hooks.pin_jumpstarter]
name = "pin_jumpstarter"
