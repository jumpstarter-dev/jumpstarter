[project]
name = "jumpstarter-example-automotive"
version = "0.1.0"
description = "Representative ECU diagnostic test using jumpstarter with a stateful mock ECU"
authors = [
  { name = "Kirk Brauer", email = "kbrauer@hatci.com" },
  { name = "Nick Cao", email = "ncao@redhat.com" },
  { name = "Miguel Angel Ajo Pelayo", email = "majopela@redhat.com" },
]
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
  "pytest>=8.3.2",
  "jumpstarter",
  "jumpstarter-driver-uds-doip",
]

[tool.pytest.ini_options]
log_cli = true
log_cli_level = "INFO"
