# Package-local driver registry — the pattern for OUT-OF-TREE driver packages: ship a registry
# snippet listing your drivers under their interface (and custom clients), layered over the
# monorepo's committed interfaces/registry/ by the build hook's `registry =` key.
version: 1
interfaces:
  - name: jumpstarter.interfaces.power.v1.PowerInterface
    proto: jumpstarter/interfaces/power/v1/power.proto
    drivers:
      - name: jumpstarter_driver_power_example.driver.ExamplePower
        clients:
          python: jumpstarter_driver_power_example.client.CyclingPowerClient
